body:
  text: 下卷頭痛頭者諸陽之會也産後五臟皆虛胃氣虧弱穀氣尚乏則令虛熱陽氣不守上湊於頭陽實陰虛則令頭痛也亦有産後敗血作痛者薛立齊曰前證若中氣虛用補中益氣湯加蔓荊子若血虛用四揚加參朮氣血俱虛用八珍湯若因風寒所傷用補中益氣湯加川芎産寶黑龍丹治産後頭痛不可忍一切血痛危急欲死及胎衣不下但灌藥得下者遂安真産門之寶劑也五靈脂當歸川芎熟地高良薑各五錢上咀碎曬極干以固濟小罐盛之燈盞封口嚴密以文武火煅一柱香放涼處退火毒取出藥如黑糟研細入花蕊石煅過另研二錢琥珀另研一錢乳香另研錢半百草霜五錢共前煅過藥研勻醋糊為丸彈子大每服一丸用薑汁好酒童便半盞將藥一丸於炭火中燒淬入酒便內調化頓服立效黑龍丹序仲氏嫂金華君在秦産七日而不食始言頭痛甚欲取大石壓食頃漸定心痛則以十指抓壁欲死目痛即欲以手自剜之如是者旬日國醫三四人郡官中善亦數人相顧無以為計不知病根所起醫者術窮病者益困余度疾勢危急非神丹不能愈須進黑龍丹仲氏猶豫謂數日不食恐不勝黃昏進半粒疾少間中夜再進藥下寐如平時平旦一行三升許如蝗蟲子疾減半巳刻又行如前則頓愈矣遣荊叉輩視之奄殆無氣午後體方涼氣方屬微言索飲自此遂平復大抵産後以去汙血為先血滯不快作禍如是老嫗中醫不識疾病之根豈得無夭枉者不遇良醫終抱遺恨今以黑龍丹廣濟施人俾世之人感是疾者得盡起天年非祈於報所翼救疾苦存性命耳崇寧元年五月五日郭忳序川芎散治産後頭痛真天台烏藥大川芎等分上為細末每服三錢燒紅稱錘淬酒調服加減四物湯治産後頭痛血虛痰癖寒厥皆治蒼朮一錢半羌活川芎防風香附炒白芷各一錢石膏二錢半細辛一錢二分當歸八分甘草五分用水二盞姜三片煎服血虛倍當歸加芍藥有汗加黃耆及桂痰癖加半夏茯苓熱痰倍加石膏加知母寒厥加天麻附子遍身痛産後百節開張血脈流散遇氣弱則經絡皮肉之間血滯不散骨節不利筋脈引急所以腰背不得轉側手足不能動搖身熱頭痛若以為傷寒治之則汗出而筋脈動惕手足厥冷變生他病但宜服趁痛散趁痛散治産後氣弱血滯遍身疼痛及身熱頭痛牛膝酒浸一錢甘草炙一錢薤白一錢當歸一錢半桂心一錢半白朮一錢半黃耆一錢半獨活一錢半上每五七錢水二鍾煎一鍾空心熱服蒼朮四物各半湯四物湯半兩蒼朮半兩上用水二鍾煎一鍾溫服下活血丹更妙活血丹熟地三兩當歸白朮白芍續斷人參各一兩上為末酒糊丸如梧桐子大每服百丸薛立齊曰産後身痛若以手按而痛益甚是血滯也用四物炮薑紅花桃仁澤蘭補而散之若按而痛稍緩是血虛也用四物炮薑白朮人參補而養之一産婦身痛發熱不食煩燥不寐盜汗服解散行血之藥不時昏憒六脈洪大如無用補中益氣加炮薑半夏一服頓減又二服寢食甘美但背強而疼用八珍散大補湯調理而安一産婦遍身頭項作疼惡寒拘急脈浮緊此風寒之證用五積散一劑汗出而愈但倦怠發熱此邪氣去而真氣虛也用八珍湯調補而痊中風産後中風者由産時傷動血氣勞損臟腑未曾平復起早勞動致使氣虛而風邪乘虛入之客於皮膚經絡致令痛痹羸乏不任少氣大凡筋脈挾寒則攣急喎僻挾濕則縱緩虛弱若入諸臟恍惚驚悸隨其所傷臟腑經絡而生病焉郭稽中論曰産後中風者何答曰産後五七日內強力下床或一月之內傷於房室或懷憂怒擾蕩中和或因食生硬傷動臟腑得病之初眼澀口噤肌肉瞤搐漸至腰脊筋急強直者不可治此乃人作非偶爾中風所得也薛立齊曰前證果外邪所傷形氣不足病氣有餘當補元氣為主稍佐以治病之藥若強力不休月內入房屬形氣俱不足當純補元氣多有復蘇者若誤投風藥乃促其危也丹溪先生曰産後中風口眼喎斜必用大補氣血然後治痰當以左右手脈分其氣血多少以治切不可作中風用發表治風之藥當歸散治産後中風牙關緊閉不省人事口吐涎沫手足瘛瘲當歸去蘆荊芥穗各等分上為細末每服二錢水一盞酒半盞煎至一盞灌之如牙關緊閉拗開微微灌之但下咽即生屢用救人大有神效乾葛湯治産後中風口噤不能言獨活去蘆二兩乾葛一兩半甘草炙半兩生薑一兩二錢半上㕮咀每服一兩用水二盞煎至一盞去滓溫服無時防風湯治産後中風背項強急胸滿短氣防風獨活葛根各五兩當歸人參白芍藥甘草各二兩上㕮咀每服八錢水一盞半棗二枚同煎至一盞去滓溫服不拘時川芎散治産後中風身背拘急有如繩束川芎羌活酸棗仁羚羊角芍藥各四兩桑白皮一兩半防風一兩二錢上㕮咀每服一兩水二大盞煎至一盞不拘時日二服千金雞矢醴治産後中風口噤困篤腰背強直時時反折烏雞矢三升大豆二升上先炒豆聲絶次炒雞矢令黃以酒一升先淋雞矢取汁淋豆每服一盞凡四五服極妙竹瀝一物飲治産後風痙口噤面青手足急強反張竹瀝用火自取者上用二升微點薑汁分五服頻頻溫服神效大烏豆治中風背強口噤或煩燥或頭面手足重或身癢直視皆是虛冷中風上豆用三升炒令熟乘熱以清酒三升浸之密封良久去豆分三服覆衣取汗身潤即愈一則防禦風邪一則消散瘀血華他愈風散治産後中風口噤手足瘛瘲角弓反張或血暈不省四肢強直或心中倒築吐瀉欲死荊芥穗微焙為末每服三錢豆淋酒調服或童子小便服之亦妙口噤則擀齒灌之齦噤灌入鼻中其效如神此方古書盛稱其妙一名如聖散一名一捻金悅生隨抄呼為再生丹一婦人産後睡久及醒則昏昏如醉不省人事醫以此藥及交加散云服後當睡必以左手搔頭用之果然交加散治産後中風百病兼治婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為瘕並宜服之生地黃一升研取自然汁如無鮮者以水泡透研爛取之生薑十二兩研取自然汁上先將地黃汁炒生薑滓生薑汁炒地黃滓各稍干焙為細末每服三錢溫酒調下尋常腹痛亦宜服産後尤不可少濟危上丹治産後虛極生風乳香五靈脂硫黃玄精石同研極細阿膠炒珠卷柏生用桑寄生陳皮各等分上將四味同研停於銀石器內微炒勿焦再研極細復入余藥為末拌勻生地黃汁和丸如梧桐子大每服二十丸煎當歸湯服下産後虛極生風者婦人以榮血為主因下血太多氣無所主唇青肉冷汗出目眩神昏命在須臾者虛極生風也應急服濟危上丹若以風藥治之則誤也薛立齊曰前證屬血氣俱虛者用十全大補湯如不應加附子鉤藤鉤若肝經血虛用逍遙散加鉤藤鉤經云脾之榮在唇心之液為汗若心脾兩臟虛極急用參附湯救之一婦人患前證或用補劑四肢逆冷自汗瀉泄腸鳴腹痛余以陽氣虛寒用六君子姜附各加至五錢不應以參附各一兩始應良久不服仍腸鳴腹痛復炙關無穴百壯及服十全大補湯方效瘛瘲附角弓反張薛立齊云瘈者筋脈拘急也瘲者筋脈弛縱也經云肝主筋而藏血蓋肝氣為陽為火肝血為陰為水前證因産後陰血去多陽火熾盛筋無所養而然耳故癰疽膿水過多金瘡出血過甚則陽隨陰散亦多致此治潔當用八珍加丹皮鉤藤以生陰血則陽火自退諸證自愈如不應當用四君芎歸丹皮鉤藤以補脾土蓋血生於至陰至陰者脾土也故小兒吐瀉之後脾胃虧損亦多患之乃虛象也無風可逐無痰可消若屬陽氣脫陷者用補中益氣湯加薑桂陽氣虛敗者用十全大補湯加桂附亦有復生者此等證候若肢體惡寒脈微細者為真若脈浮大發熱煩渴此為假象惟當固本為善若無力抽搐戴眼反折汗出如珠流者皆不治又有角弓反張者風邪乘虛入於諸陽阿經則腰背反折攣急如角弓之狀也皆因氣血耗損腠理不密汗出過多宜固氣血為主佐以本方丹溪所謂産後以大補氣血為主雖有雜病證以末治之此也如惡寒發熱等證乃氣血虛耗之極宜大劑參耆歸朮肉桂以培養之如不應急用炮附子再不應用人參一兩炮附子二三錢名參附湯若猶未應藥力未及也宜多用之增損柴胡湯治産後感異證手足牽搐涎潮昏悶柴胡三錢黃芩一錢二分人參甘草半夏各一錢半石膏二錢黃耆一錢半知母一錢上㕮咀分二服水二盞姜三片棗二枚煎八分不拘時服秦艽湯治産後血虛生風手足瘛瘲秦艽芍藥柴胡各一錢七分甘草炙一錢三分黃芩防風各一錢二分人參半夏各一錢上水二鍾姜三片煎八分食遠服愈風湯交加散俱可用二方見前痙疾産後血虛腠理不密故多汗因遇風邪搏之則變痙痙者口噤不開背強而直如發癇狀宜速擀開口灌小續命湯稍緩即汗出如雨手摸空者不可治也薛立齊云産後發痙因去血過多元氣虧極或外邪相搏以致牙關緊閉急四肢痙強或腰背反張肢體抽搐若有汗而不惡寒者曰柔痊若無汗而惡寒曰剛痙産後患之實由亡血過多筋無所養而致故傷寒汗下過多潰瘍膿血大泄患之乃敗證也大補血氣多保無虞若攻風邪死無疑矣一産婦牙關緊急腰背反張四肢抽搐兩目連札余以為去血過多元氣虧損陰火熾盛用十全大補加炮姜一劑面蘇又數劑而安吳江史萬湖家人婦忽僕牙關緊急已死矣詢之是新産婦出直廚知其勞傷血氣而發痙也急用十全大補加附子煎滾令人推正其身一人以手挾正其面卻掰開其口灌之不咽藥已冷令側其面出之仍正其面復灌以熱藥又冷又灌如此五次方咽下隨灌以熱藥遂蘇夷堅志云杜壬治郝質子婦産四日瘛瘲戴眼弓背反張壬以為痙病與大豆紫湯獨活湯而愈政和間余妻方娩猶在蓐中忽作此證頭足反接相去二尺家人驚駭以數婢強拗之以數婢強拗不直適記所云藥草有獨活乃急為之召醫未至連進三劑遂能直醫至即愈矣更不復藥乃知古人處方之神驗産婦四肢攣急者因臟腑俱虛月內未滿起早勞役動傷臟腑虛損未復為風所乘風邪冷氣客於皮膚經絡則令人頑痹不仁羸乏少氣筋脈挾寒則攣急也薛立齊曰前證若肝經風熱血燥用加味逍遙散如不應用六味地黃丸以補腎水仍參前雜證諸風血方論治之小續命湯治産後中風及剛痙柔痙防風一錢麻黃去節黃芩去朽白芍人參各八分川芎防己肉桂各七分附子炮去皮臍杏仁去皮尖麩炒各五分甘草炙四分上薑棗水煎服春夏加石膏知母黃芩秋冬加官桂附子芍藥柔痙自汗者去麻黃加葛根按上方朱奉議稱剛柔二痙並可加減與之但産後血氣大虛之人恐不宜輕發其表若邪氣實脈浮弦有力者用之固宜其虛弱之人不若用大豆紫湯及防風當歸散大豆紫湯治産後中風痱痙背強口噤直視煩熱若脈緊大者不治川獨活去蘆一兩半大豆半升酒三斤上先用酒浸獨活一兩沸別炒大豆極焦煙出急投酒中密封候冷去豆每服一二小鐘許得少汗則愈日進十服此藥能去風消血結如妊娠胎死腹中服此得瘥大豆湯治産後風痙不省人事及妊娠挾風一切蓐草之間諸般病證大豆五合炒黃獨活去蘆葛根各八分防己去皮六兩上㕮咀每服五錢酒二盞煎至一盞半不拘時日三服防風當歸散此方最穩妥防風當歸川芎地黃各一兩上每服一兩水煎溫服芎藭散治産後四肢筋脈攣急疼痛背項強直芎藭羌活當歸各去蘆酸棗仁炒羚羊角屑各七錢半防風牛蒡子炒各一兩桂心赤芍藥各五錢上㕮咀每服八錢水煎去渣溫服不拘時如服不應可用八珍湯更不應用十全大補湯産後手足厥冷宜灸肩井穴一婦人産後日食茶粥二十餘碗至一月後遍身冰冷數塊以指按其冷處即冷從指下上應至心如是者二年諸治不效以八物湯去地黃加橘紅入薑汁竹瀝一酒鍾十服乃溫不語人心有孔孔中有毛産後虛弱多致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故會不語宜服七珍散因驚者屬肝經風熱用加味逍遙散加防風白芷鉤藤因憂思鬱結者用加味歸脾湯加升麻一産婦不語用七珍散而愈後復不愈內熱脯熱肢體倦怠飲食不進用加味歸脾湯為主佐以七珍散而愈後因怒不語口噤腰背反張手足發搐或小便見血面赤或青或黃余曰面青肝之色也黃者脾氣虛也赤者心血虛也用八珍湯加鉤藤鉤茯苓遠志漸愈又用加味歸脾湯而痊七珍散治産後不語及發狂人參石菖蒲生地黃川芎各一兩細辛一錢防風辰砂飛過各五錢上為極細末每服一錢薄荷湯調下無時三物湯治産後不語人參石蓮肉不去心石菖蒲各等分上每服五錢水煎服一方用白礬生為末每服一錢熱水調下逐血補心湯治産後失音紅花赤芍藥生地黃桔梗蘇葉前胡茯苓防風黃連膽星粉葛各二錢當歸三錢薄荷人參升麻各一錢五分半夏二錢五分甘草一錢上為粗末分二服每服水一鍾半姜三片煎七分空心服渣再煎癲狂産後語言顛倒或狂言詀語如見鬼神者其源不一須仔細辨證用藥一則産後心虛敗血停積上干於心而狂言獨語者當作乍見鬼神條求之二則産後臟虛心神驚悸言語錯亂不自覺知神思不安者當在驚悸條求之三則宿有風毒因産心虛氣弱腰背狂直或歌哭嗔笑言語錯亂當作風痙治四則産後敗血迷亂心經而顛狂言語無常或暈悶者當作血暈治五則産後感冒風寒惡露斬然不行壋寒發熱如瘧晝日明瞭暮則詀語如見鬼狀當作熱入血室治之又有産後因驚敗血衝心昏悶發狂如有鬼祟宜用大聖澤蘭散或好辰砂研細酸棗仁湯調下一錢立效薛立齊曰前證當固胃氣為主而佐以見證之藥若一於攻痰則誤矣琥珀地黃湯治産後惡露衝心語言亂通如見鬼神驚悸不定小便不利者琥珀辰砂沒藥各研細當歸各一兩上為細末每服二錢空心白湯調下日三服心腹痛者加延胡索兼暈者加蒲黃牡丹飲治敗血衝心發熱狂言奔走脈虛大者乾荷葉生地黃牡丹皮各等分上濃煎調生蒲黃末二錢一服即定烏金散治産後狂言亂語目見鬼神當歸遠志肉川芎酸棗仁白朮赤芍藥香附子辰砂研細熟地黃茯神各二錢半夏三錢全蠍麥冬人參牛膝天麻各一錢甘草一錢陳皮白芷各一錢半上銼細作二服水一鍾半姜三片蔥三根入金銀同煎一碗溫服大聖澤蘭散治産後敗血衝心中風口噤及墜胎腹中刺痛橫生逆産胎衣不下血昏血滯血崩血入四肢一切血證諸種風氣或傷寒吐逆咳嗽寒熱往來遍身生瘡頭痛惡心經脈不調赤白帶下胎藏虛冷數常墜胎久無子息室女經脈不通並宜服之常服暖子宮和血氣悅顏色退風冷消除百病澤蘭葉石膏研各二兩卷柏去根防風白茯苓去皮厚朴薑製細辛桔梗柏子仁五味子人參藁本吳茱萸湯洗七次焙乾薑炮白朮川椒去子及閉口者炒出汗川烏頭炮去皮臍白芷黃耆丹參各七錢半蕪荑微炒甘草川芎白芍當歸各一兩七錢半白薇炒燥五錢肉桂一兩阿膠炒珠五錢生地黃一兩半上為細末每服二錢臨臥熱酒調下若急疾不拘時日三服何氏方治産後邪風入心顛狂如見祟物大辰砂一二錢研極細人乳三四茶匙許調碗內仍掘白項活地龍一條入藥內候地龍滾三滾取出地龍不用但欲得地龍身上涎耳無令帶藥出少入無灰酒與乳汁相和重湯內溫作二三服驚風入心忡悸不止者宜抱龍丸茯神散治産後心神恍惚言語失度睡臥不安如見鬼神茯神一兩去皮木人參龍齒研琥珀研赤芍藥黃耆牛膝各五錢桂心五錢生地一兩半上為末每服三錢水一盞煎七分去渣服調經散治産後狂躁昏悶時見鬼神沒藥琥珀各另研細桂心各一錢芍藥當歸各二錢半麝香另研細辛各五分上為末每服五六分薑汁溫酒各少許調服按右方挾寒者宜挾熱者宜四物湯加柴胡倍生地薛文齊曰前證乃血虛神不守舍大端宜補元氣仍參各證互用蓐勞産後蓐勞者由生産日淺血氣虛弱飲食未平將養失所而風冷客之使人虛乏勞倦乍臥乍起容顏憔悴飲食不消口乾頭昏百節疼痛有時盜汗寒熱如瘧背膊煩悶四肢不舉沉重著床此為蓐勞之候薛立齊曰前證當扶養正氣為主用六君子湯加當歸若脾肺氣虛而咳嗽口乾用補中益氣湯加麥冬五味子頭暈加蔓荊子若肝經血虛而肢體作痛用四物湯加參術肝腎虛弱自汗盜汗寒熱往來者用六味丸加五味子因脾血虛弱肚腹作痛月經不調用八珍湯倍白朮因脾虛血燥皮膚瘙癢用加味逍遙散大抵此證多因脾胃虛弱飲食減少以致諸經疲憊當補脾胃飲食既進精氣化生諸臟有所倚賴其病自愈矣白茯苓散治蓐勞因生産日淺久坐多語勤動用力以致四肢疼痛寒熱如瘧白茯苓一兩當歸川芎桂心白芍黃耆人參各半兩熟地黃一兩上㕮咀以水二盞入豬腎一雙去筋皮切碎姜三片棗三枚煎一盞濾出清汁入藥半兩煎七分去渣溫服黃耆煮散治産後肌膚黃瘦面無顏色或壋寒壯熱四肢痠痛心煩頭痛鱉甲醋炙黃耆桂心當歸桑寄生白茯苓白芍人參熟地麥冬甘草炙各半兩牛膝七錢上為細末每服用豬石子一對即睪丸去脂膜切破先以水一盞入姜三片棗三枚煎至七分去石子薑棗卻下藥五錢更煎至四分去渣空心臨臥二服渣並煎胡氏牡丹散治産後虛羸發熱自汗欲變蓐勞或血氣所搏經候不調白芍藥當歸五加皮地骨皮人參各半兩沒藥桂心各二錢牡丹皮三錢上為細末每服五錢水酒各半盞如不飲酒只用水一盞開元錢一枚麻油蘸之同煎七分去滓通口服煎不得攪吃不得吹紫河車丸佳豬腰子粥亦妙虛煩發熱薛立齊曰産後虛煩發熱乃陽隨陰散氣血俱虛若惡寒發熱煩躁多渴急用十全大補湯若熱愈甚急加桂附若作渴面赤宜用當歸補血湯若誤認為火證投以涼劑禍在反掌人參當歸湯治産去血過多血虛則陰虛陰虛則生內熱心胸煩滿呼吸短氣頭痛悶亂晡時轉甚熟地人參當歸身桂心麥冬各二錢白芍炒二錢半血熱者加生地二錢水二鍾粳米一合竹葉十片煎至一鍾溫服甘竹茹湯治産後內虛煩熱短氣甘竹茹二錢人參茯苓各二錢甘草二錢黃耆七錢上水二鍾煎八分溫服竹葉湯治産後短氣欲絶心中煩悶新竹葉切碎麥冬去心小麥各五兩甘草一兩生薑二兩大棗十二枚上用水十碗煮竹葉小麥至八碗去渣納余藥煮取三碗去渣作三四次服虛悸加人參二兩少氣加糯米五合熟地黃湯治産後虛渴不止少氣腳弱眼眩飲食無味熟地酒蒸焙一錢半人參麥冬各二錢栝蔞根二錢甘草炙五分上用水二盅糯米一撮生薑三片棗二枚煎至一鍾不拘時服栝蔞根湯療産後血虛發渴栝蔞根四錢麥冬五錢人參三錢生地黃三錢土瓜根三錢甘草二錢水二鍾大棗三枚煎八分溫服薛立齊曰産後發渴若出血過多虛火上炎用童子小便或四物湯加白朮麥冬丹皮若胃氣虛而有熱用竹葉歸耆湯血脫髮熱煩躁用當歸補血湯若胃氣虛弱用補中益氣湯因吐瀉者七味白朮散竹葉歸耆湯治胃氣虛熱口乾作渴人參白朮炒麥冬各一錢黃耆三錢竹葉錢半甘草炙五分水煎服不拘時當歸補血湯治肌膚燥熱目赤面紅煩渴引飲晝夜不息脈洪大而虛重按全無此血虛證誤服白虎湯必死當歸三錢黃耆一兩水煎服增損柴胡湯治産後發寒熱飲食少腹脹柴胡人參甘草半夏陳皮川芎白芍各等分每服三錢姜五片棗二枚煎服小柴胡加生地黃湯治産後往來寒熱柴胡三錢黃芩一錢半人參七分半夏八分大棗三枚生地黃一錢梔子七分枳殼六分水煎食遠服汗出不止産後虛煩不止者由陰氣虛陽無所附陽氣獨發於外故汗出也陰氣虛弱不復故汗出不止因之遇風則變成痙縱不成痙亦虛乏短氣身體柴瘦唇口乾燥久則經水短絶由津液竭故也薛立齊曰前證屬血氣俱虛急用十全大補湯如不應用參附耆附等湯若汗多亡陽發痙尤當用前藥一産婦略聞音響其汗如水而昏憒諸藥到口即嘔余以為脾氣虛敗用參附末為細丸時含三五粒隨液咽下乃漸加之至錢許卻服參附湯而痊一産婦盜汗不止遂至廢寐神思疲甚口乾引飲余謂血虛有熱用當歸補血湯以代茶又以當歸六黃湯內芩連柏炒黑倍人參五味子二劑而愈凡産後忽冒悶汗出不識人屬大虛宜固元氣為主其汗不止必變柔痙麻黃根湯治産後虛汗不止當歸黃耆麻黃根牡蠣煅成粉人參粉草各等分上水一盞每服四錢煎七分溫服經效方治汗出不止黃芩一錢半白朮牡蠣煅茯苓防風麥冬生地各八分大棗七枚上用水二鍾煎至七分空心溫服止汗散治産後盜汗不止一應汗多者皆可服牡蠣煅成粉小麥麩炒黃碾成粉上等分和勻豬肉煮湯調服二錢人參湯治産後諸虛不足發熱盜汗人參當歸各等分上為末以豬腰子一隻去脂膜切小片子水三鍾糯米半合蔥白兩條煮米熟取清汁一盞入藥二錢煎至八分溫服不拘時當歸六黃湯治虛熱盜汗不止不應加人參白朮不寐加酸棗仁當歸熟地黃耆各二錢生地黃柏炒黑黃芩炒黑黃連炒黑各一錢上水煎服參附湯治陽氣虛寒自汗惡寒或手足逆冷大便自利或臍腹疼痛厄逆不食或汗多發痙人參一兩附子炮五錢上作一服薑棗煎徐徐溫服耆附湯治陽氣虛脫惡寒自汗或口噤痰湧四肢逆冷或吐瀉腹痛飲食不入一切虛寒等證黃耆一兩附子炮五錢上水一大碗薑棗煎服如不應倍加附子方得全濟瀉痢産後腸胃虛怯寒邪易侵若未滿月飲冷當風乘虛襲留於盲膜散於腹脅故腹痛作陳或如錐刀所刺流入大腸水穀不化洞泄腸鳴或下赤白胠脅䐜脹急服調中湯立愈若醫者以為積滯取之禍不旋踵謹之謹之薛立齊曰産後瀉痢或因飲食損傷脾土或脾土虛不能消食當審而治之若米食所傷用六君加穀芽若麵食所傷用六君子加麥芽若肉食所傷用六君加山楂神麯凡兼嘔吐者加藿香若兼吞酸或嘔吐用前藥送越鞠丸若肝木侮土用六君子加紫胡炮姜若寒水侮土用錢氏益黃散久瀉元氣下陷用補中益氣湯及四神丸命門火衰不能生土者用八味丸以補土母若小便澀滯肢體漸腫或兼喘咳用金匱腎氣丸的奇散治産後余血滲入大腸洞泄不禁下青白黑色荊芥大者四五穗於盞內燒灰不得犯油火入麝香少許研湯三呷調下此藥雖微能治大病香附芍藥湯治産後痢疾當歸川芎芍藥香附陳皮茯苓白朮各一錢砂仁六分甘草五分澤瀉五分木香三分上水煎服腹疼者倍芍藥加黃連八分香連丸治一切泄痢神效黃連淨十二兩吳茱萸去枝梗十兩上二味用熱水拌和入瓷器內置熱湯燉一日同炒至黃連紫黃色去茱用連為末每末四兩入木香末一兩淡醋米飲為丸桐子大每服三四十丸滾湯下久痢中氣下陷者用補中益氣湯調中湯治産後虛寒洞泄高良薑當歸桂心芍藥川芎各一兩附子甘草各半兩上為粗末每服三錢水煎服瘧疾凡産後瘧疾多由虧血挾寒熱而作大法宜柴胡四物湯調之熱多者草果飲子寒多者生熟飲子薛立齊曰産後瘧疾因脾胃虛弱飲食停滯或因外邪所感或鬱怒傷脾或暑邪所伏審系飲食用六君加桔梗蒼朮藿香如外邪多而飲食少用藿香正氣散飲食勞役用補中益氣湯氣血虛弱用十全大補湯虛寒用六君加薑桂元氣脫陷急加附子大凡久瘧多屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒陰火下流則寒熱交作或吐瀉不食腹痛煩渴發熱譫語或手足逆冷雖見百證當峻溫補其病自退若誤用清脾截瘧之類多致不起中氣傷而變證多矣草果飲子治産後瘧疾寒熱相半或多熱者宜此半夏赤茯苓甘草炙草果川芎陳皮白芷各二錢青皮良薑紫蘇各二錢半乾薑四錢上為粗末分作四服每用水一大碗姜三片棗三枚煎七分臨發日連進二服即愈生熟飲子治産後瘧疾多寒者肉豆蔻草果仁厚朴生去粗皮半夏制陳皮甘草大棗生薑上八味各等分細銼一半用濕紙裹煨令香熟去紙與一半生者和勻每服五錢水一大碗煎七分食前一服食後一服按瘧初起當用上兩法不愈當用薛氏法霍亂産後霍亂氣血俱傷臟腑虛損或飲食不消觸冒風冷所致陰陽不順清濁相干氣亂於腸胃之間真邪相搏冷熱不調上吐下利故曰霍亂也經云渴而飲水者五苓散寒多不飲水者理中丸大段虛冷厥逆者加附子來復丹亦妙白朮散治産後霍亂吐利腹痛煩渴手足逆冷白朮橘紅麥冬去心乾薑人參各一錢甘草五分水一盞姜三片煎服溫中散治産後霍亂吐瀉不止人參白朮當歸各一錢草豆蔻仁乾薑各八分厚朴薑製一錢二分水一盞煎服若吐逆不受湯藥用伏龍肝研細末三錢米湯調徐徐咽下即受血崩産後血崩多因驚憂恚怒臟氣不平或服斷血藥早致惡血不消鬱滿作堅亦成崩中薛立齊曰若血滯小腹脹滿用失笑散方見血暈血少小腹虛痞芎藭湯肝火血妄行加味逍遙散脾郁不能統血加味歸脾湯脾虛不攝血補中益氣湯厚味積熱清胃散加槐花風熱相搏四君子加防風枳殼一産婦血崩小腹脹疼用順氣行血之劑其崩如湧四肢不收惡寒嘔吐大便頻瀉余用六君加炮黑乾薑四劑稍愈又以十全大補三十餘劑而痊一産婦血崩因怒血崩其血如湧仆地口噤目斜手足抽搐此肝經血耗生風余用六味丸料一劑諸證悉退但食少晡熱佐以四君柴胡牡丹皮而愈芎藭湯芎藭當歸白芍藥各等分上大劑濃煎空心服白芍藥散治産後崩中淋瀝不絶黃瘦虛損白芍牡蠣乾薑熟地黃桂心黃耆鹿角膠烏賊骨龍骨各一兩上為末每服二錢食前溫酒下阿膠丸治産後崩中下血不止虛羸無力阿膠赤石脂各一兩半續斷川芎當歸甘草丹參各一兩龍骨鹿茸酥炙烏魚骨鱉甲酥炙各二兩上為細末煉蜜為丸如梧子大空心溫酒下三十丸又方治産後血崩不止香附子童便浸炒赤二兩蓮蓬殼五枚燒存性上為末米飲調下二錢浮腫産後四肢浮腫者敗血乘虛停積循經流入四肢留淫日深不能復還腐壞如水故令面黃四肢浮腫醫人不識便作水氣治之多用導水之藥極能虛人産後既虛又以藥虛之是謂虛虛多致夭枉丹溪曰産後腫必用大補氣血為主少佐以蒼朮茯苓使水自利薛立齊曰前證若寒水侮土宜養脾肺若氣虛浮腫宜益脾胃若水氣浮腫宜補中氣當參雜證本門白朮湯治心腹堅大如盤名曰氣分枳實一兩半白朮三兩上㕮咀每服四錢水一盞半煎至七分去滓溫服腹中軟即愈乾漆散治産後遍身浮腫疼痛及産後血水諸證乾漆大麥糵等分上各為細末以新瓦罐子中鋪一重麥糵一重乾漆填滿用鹽泥固濟火煅通赤放冷研為細末但是産後諸疾熱酒調下二錢丹溪方治産後浮腫小便少口渴惡寒無力脈沉此體虛而濕熱宜補中導水行氣可也白朮二兩半陳皮一兩川芎半兩木通五錢茯苓三錢上水煎下與點丸二十五丸炒按與點丸用黃芩炒為末粥糊丸亦名清金丸奪魂散治産後虛腫喘促利小便則愈生薑三兩取汁白麵三兩大半夏七枚上用生薑汁和麵裹半夏為七餅子煨焦熟為末水調一盞小便利為效加味八物湯治産後遍身浮腫氣急潮熱人參白茯苓熟地黃小茴香各三錢白朮川芎當歸白芍香附子各五錢甘草黃芩柴胡各一錢上銼分五服每服水一鍾半生薑三片煎至七分空心熱服若腹痛加延胡索枳殼倍芍藥嘔吐噁心加藿香砂仁咳嗽加五味子款冬花加減濟生腎氣丸治産後及一切脾胃虛損腰重腳腫小便不利或肚腹膨脹四肢浮腫或喘急痰盛已成蠱證其效如神白茯苓二兩附子半兩車前子山茱萸川牛膝肉桂去皮澤瀉山藥牡丹皮各一兩懷地黃四兩酒拌蒸熟杵膏上為末加蜜煉為丸如梧桐子大每服七八十丸空心白湯下喘産後下血過多榮血暴竭衛氣無主獨聚肺中故令喘也此名孤陽絶陰為難治陳無擇曰産後喘急固可畏若是敗血上熏於肺可用奪命丹若榮血暴絶宜大料芎藭湯亦可救薛立齊曰前證若脾肺虛寒用補中益氣加炮薑肉桂若陽氣虛脫更加附子若瘀血入肺急用二味參蘇飲一産婦喘促自汗手足俱冷常以手護臍腹此陽氣虛脫用參附湯四劑而愈血竭散治産後敗血衝心胸滿上喘命在須臾宜服真血竭沒藥上等分研細頻篩再研取盡為度每服二錢用童便合好酒半大盞煎一沸溫調下方産一服上床良久再服其惡血自循經下免生百病云岐參蘇飲治産後入血於肺面黑髮喘欲死者人參一兩為末蘇木二兩上用水二碗煮取蘇木一碗去渣調參末隨時加減服神效旋覆花湯治産後傷風寒喘促咳嗽痰涎壅盛坐臥不寧旋覆花赤芍藥荊芥穗半夏曲前胡甘草茯苓五味子杏仁去皮麩炒麻黃各等分或芍藥茯苓倍加亦妙每服四五錢薑棗煎服有汗者不宜五味子湯治産後喘促脈伏而厥五味子杵人參杏仁各二錢麥冬去心陳皮各一錢上姜三片棗二枚水煎服大補湯治産後百日外唇白氣促面青浮腫有汗乃大虛之證急宜服此當歸大川芎大白朮白芍藥白茯苓多人參多黃耆多五味子少熟地黃乾薑甘草上水二鍾薑棗煎服大便閉産後大便不通由去血過多大腸乾涸或血虛火燥以致祕澀不可計其日期及飲食數多用藥通之潤之必待腹滿覺脹自欲去而不能者乃結在直腸宜用豬膽導之若誤以為有熱用苦寒之劑通之反傷中焦元氣或愈加難通或通而瀉不能止必成敗證若屬血虛火燥用加味逍遙散氣血俱虛用八珍湯一産婦大便不通七日矣飲食如常腹中如故用八珍湯加桃仁杏仁至二十一日腹滿欲去用豬膽汁潤之先去幹糞數塊後皆常糞而安一産婦大便祕澀諸藥不應苦不可言令飲人乳而愈牛乳亦可大小便不通者俱宜陳無擇曰産後不得利利者百無一生去血過多臟燥大便閉澀宜用蔥涎調臘茶為丸復以臘茶下之必通大黃決不可用丹溪治産後祕結不通膨滿氣急坐臥俱難用大麥糵炒黃為末酒下一合神效又麻子蘇子粥最為穩妥用紫蘇子火麻子二味各半合洗淨研極細用水再研取汁一盞分二次煮粥啜下此粥不惟産後可服大抵老人諸虛風祕皆宜服之有一媼年八十四忽而腹痛頭疼噁心不食召醫數人用補脾及清利頭目等全不入食此正是老人風祕臟腑壅滯聚於胸中則腹脹噁心上至於巔則頭痛神不清令作此粥兩啜而氣泄先下結糞後漸得通利不用藥而自愈矣桃花散治産後氣滯血澀大小便祕桃仁葵子滑石檳榔各等分上為細末每服二錢空心蔥白湯調下小便閉産後小便不通及淋瀝澀痛者由氣虛挾熱不可專用分利滲導之藥重損真氣膀胱虛熱用六味丸若陰虛而陽無以化用滋陰腎氣丸蓋土生金金生水當滋化源也滑石散療産後淋閉滑石一兩二錢通草車前子葵子各一兩上為末熱水調服三錢張不愚方療産後小便不通陳皮一兩去白為末上空心溫酒調下二錢一服便通又方杏仁十四枚去皮尖炒為末和飲頓服立通又方用食鹽填臍中可與臍平卻用蔥白剝去粗皮十餘莖作一縛切作一指厚安鹽上大艾炷如蔥餅子大小以火灸之覺熱氣直入腹內即時便通神驗不可俱述産婦生理不順致傷尿脬遺尿無時丹溪曰嘗見收生者不謹損破尿脬因而淋漓遂成廢疾者有徐氏婦得此因思肌肉破傷在外者既可補完在內者恐也可治遂茲其脈虛甚試與峻補因以參耆為君芎歸為臣陳皮茯苓為佐以豬羊胞煮湯煎服極飢時飲之一月而安蓋氣血驟長其胞自完恐稍緩亦難成功矣補脬飲治産婦傷動脬破終日不小便但淋濕不幹黃絲絹一尺自然黃絲織成者白芨末白牡丹根皮各一錢黃蠟五錢用水三碗煎至絹爛如餳服之勿作聲作聲無效子宮不收婦人因産努力太過致陰下脫若脫肛狀陰下挺出逼迫腫痛舉重房勞皆能發作小便淋漓作苦此由氣血虛弱宜用十全大補湯腫脹焮痛肝經虛熱也加味逍遙散若因憂怒傷脾加味歸脾湯若因暴怒肝火出血用龍膽瀉肝湯丹溪治一婦人産子後陰戶中下一物如合包狀有兩歧其夫求治丹溪以為子宮因氣血弱而下墜遂用升麻當歸黃耆人參川芎大料二帖與之半日後其夫復來曰服一次後覺響一聲視之已收入訖但因經宿於著席上一片如掌大在席妻在家哭泣恐傷破不可復生丹溪曰此非腸胃必脂膜也肌肉破傷可復完若氣血充盛必可生滿遂用四物湯加人參服一百帖三年後生子當歸散治陰下脫當歸黃耆各二兩芍藥一兩蝟皮燒存性半兩牡蠣煅二兩半上為末每服三錢溫酒米湯任調下忌登高舉重硫黃散治産後陰脫硫黃烏賊魚骨各半兩五味子二錢半上為末摻患處硫黃湯治産勞玉門不閉硫黃四兩吳茱萸菟絲子各半兩蛇床子一兩上每服五六錢水一碗煎數沸去滓洗玉門日再洗效五倍子湯治産後陰挺出腫痛五倍子蛇床子荊芥枳殼上各五錢煎湯溫洗之尉法治陰挺及産後陰疼蛇床子炒乘熱布裹尉患處浸法石灰二升炒極熱湯二升投灰中澄清去灰溫坐水中以浸玉門斯須乎復如故乳汁不通婦人之乳資於衝脈若初産而無乳者宜通之若纍經産而無乳者亡津液故也須服滋益之藥若雖有乳卻不甚多者服通經之藥以動之仍以羹臛引之並宜壯脾胃為主漏蘆散治産婦氣脈壅塞乳汁不行及經絡凝滯乳中脹痛或作癰腫服之自然內消漏蘆二兩半蛇蛻十條炙栝蔞十枚急火燒焦存性上為末溫酒調下二三錢無時服藥後即以豬蹄羹投之湧泉散治乳無汁亦治乳結癰腫穿山甲洗淨一兩灰炒燥上為細末酒調服二錢玉露散治乳脈不行身體壯熱頭目暈眩川芎桔梗白芷各二錢芍藥當歸各一錢半人參白茯苓甘草各一錢上作一服水兩鍾煎至一鍾羅氏湧泉散治婦人乳汁因氣不行瞿麥穗麥門冬龍骨穿山甲炮黃王不留行各等分上為細末每服二錢熱酒調下後吃豬蹄羹少半鍾仍用木梳於左右乳上各梳三十餘梳治乳癰未破即散已結即潰極痛即止所謂吹乳者因小兒吹乳變成如未産乳腫為內吹並皆治之陳皮去白曬乾麵炒黃為末麝香二分研酒調下凡乳汁不宜積蓄惡汁不去即結為膿又乳汁不宜灑地蟻食之令人無乳宜灑東壁牆為佳治乳腫將次結成癰方用馬溺塗之數次即愈治産後乳結脹不消令敗乳自退方栝蔞一個半生半炒大粉草一寸半生半炙生薑一塊半生半煨上同銼用酒一碗煮取一盞去滓服之覺痛一會不可忍即搜去敗乳臨臥再一服以患乳著床側臥令其藥行故也又方治婦人氣血方盛或無兒飲脹痛壋寒發熱用麥芽二三兩炒熟水煎服立消其耗散血氣如此脾胃虛弱飲食不消猶多用之何耶半産妊娠日月未足胎氣未全而産者謂之半産蓋由妊婦衝任氣虛不能滋養於胎胎氣不固或顛撲閃墜致氣血損動或因熱病溫瘧之類皆令半産不可輕視將養十倍於正産也薛立齊曰小産重於大産蓋大産如栗熟自脫小産如生採破其皮殼斷其根蒂也但人輕忽致死者多治法宜補臟氣生新血去瘀血若未足月痛而欲産芎歸補中湯倍加知母止之若産而血不止人參黃耆湯補之産而心腹痛當歸川芎湯主之胎氣弱而小産者八珍湯固之若出血過多而發熱者聖愈湯汗出不止急用獨參湯發熱煩躁大渴面赤脈洪大而虛當歸補血湯身熱面赤脈沉而微四君子湯加姜附丹溪曰氣血虛損不足榮養其胎自墜推原其本皆因於熱火能消物造化自然病源乃謂風冷傷於子臟而墜此未得病情者也豫見賈氏婦但有孕三月左右必墜診其脈左手大而無力重取則澀知其血少也以其妙年只補中氣使血自榮時正夏初教以濃煎白朮湯下黃芩末一錢服三四十帖遂得保全一婦年三十餘歲有胎必墜察其性急多怒色黑氣實此相火大盛不能生氣反食氣傷精故也因令用黃芩白朮當歸甘草自二月用起三月盡止後生一子濟生芎歸補中湯治懷孕血氣虛弱不能衛養以致半産服此可保安全凡懷孕數月即墜不治久則不孕芎藭五味子阿膠蛤粉炒各一錢黃耆蜜炙當歸酒浸白芍藥白朮各一錢半人參七分杜仲去粗皮炒去絲一錢木香甘草各五分一方加乾薑八分有火者去之上作一服水二鍾煎至一鍾不拘時服阿膠湯治數墜胎小腹療痛不可忍阿膠炒成珠熟乾地黃焙艾葉微炒川芎當歸焙杜仲去粗皮炙各一錢半甘草炙八分上用水一鍾半煎七分溫服大抵治法宜審某月屬某經育養而治之人參黃耆湯治生産氣虛血下不止人參黃耆炙當歸白朮炒白芍炒艾葉各一錢阿膠炒二錢上作一劑水煎服龍骨散治損娠下血不止龍骨當歸地黃各五錢艾葉三錢地榆阿膠炒芍藥乾薑各四錢蒲黃三錢牛角腮炙焦六錢上共為細末每服三錢食前米飲調下千金療落胎下血不止方生地黃汁一小盞調代赭石末一錢日三服又方治下血不止腹痛阿膠一兩炒艾葉半兩水一大盞煎六分去滓空心服又方治下血不止疼痛亦治小便不禁家雞翎燒灰細研溫酒調下二錢少頃再服以效為度紅蘭花散治墜胎後血不出奔心悶絶不識人紅蘭微炒過男子發燒存性京墨燒紅血竭研蒲黃隔紙炒各等分上為細末以童便小半盞調二錢服之立效鹿角散治墜胎下血不盡煩滿狂悶時發寒熱鹿角屑一兩炒為末上用水一大碗煎豉一合取汁六分分三服調鹿角屑二錢日三服當歸湯治墜胎胎衣不出當歸炒牛膝酒浸焙各一錢半木通一錢半滑石研二錢冬葵子炒二錢瞿麥穗一錢水一大鐘煎七分溫服未下再服又方以水噀其面加醋少許神驗當歸川芎湯治小産心腹痛或發熱惡寒當歸川芎熟地黃白芍藥炒紅花香附青皮玄胡索炒澤蘭牡丹皮桃仁各等分上水煎入童便酒各小盅溫服若以手按腹愈痛此瘀血為患宜此藥或失笑散方見血暈若按之不痛此是血虛宜四物參苓白朮若痛而作嘔此是胃虛宜六君子湯當歸補血湯方見虛煩發熱聖愈湯治小産後血虛心煩睡臥不寧或五心煩熱熟地黃酒蒸半日生地黃酒浸川芎人參各一錢當歸酒浸黃耆炙各八分水煎服
