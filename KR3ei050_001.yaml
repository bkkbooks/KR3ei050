body:
  text: 上卷妊娠經曰陰搏陽別謂之有子此乃血氣調和陽施陰化王氏曰太衝盛而氣虛者乳子法也診其手少陰脈動盛者妊子也少陰心脈也心主血脈又腎為胞門子戶大抵少陰之經在手屬心在足屬腎腎主骨手尺中之脈按之不絶者法妊娠也難經曰女子以系胞三部脈浮沉正等按之無絶者有妊娠初持寸脈微小呼吸五至三月而尺數脈滑疾以手按之散者胞已三月也脈重手按之不散但疾不滑者五月也婦人妊娠四月欲知男法左疾為男右疾為女但疾為生二子又法得太陰脈為男太陽脈為女太陰脈沉太陽脈浮又法左手脈沉實為男右手脈浮大為女左右脈俱沉實為生二男左右手俱浮大為生二女又法尺脈左邊大為男右邊大為女左右俱大産二子大者如實狀又法左右俱浮大産二男不爾則女作男生左右俱沉産二女不爾則男作女生又法遣妊娠人面南行後呼之左回首者是男右回首者是女又法看上圊時夫從後呼之左回首是男右回首是女又婦人妊娠其左乳房有核是男右乳房有核是女婦懷離經其脈浮大而腹痛引腰脊為即欲生也但離經即痛也又法欲生者其脈離經夜半覺日中生也妊娠一月之時足厥脈養之二月足少陽三月手少陰四月手少陽五月足太陰六月足陽明七月手太陰八月手陽明九月足少陰十月足太陽驗胎散經脈不行已經三月者更看尺脈不止則是胎也川芎為末每服一錢空心艾葉煎湯調下覺腹內微動則有胎也若服後一日不動非胎必是經滯艾醋湯如過月難明有無如月數未足難明好醋炆艾服半盞後腹中翻大痛是有孕不為痛定無妊娠惡阻妊娠惡阻病産寶謂之子病巢氏病源謂之惡阻謂婦人有孕噁心阻其飲食也由胃氣怯弱中脘停痰脈息和順但肢體沉重頭眩擇食惟嗜酸鹹甚者寒熱嘔吐胸膈煩滿肥人多痰瘦人多火須用二陳湯為主保生湯治婦人經候不行身無病似病脈滑大而六脈俱勻乃是孕脈也精神如故惡聞食氣或但食一物或大吐清水此名惡阻切勿作寒病治之人參甘草各二錢半白朮陳皮香附烏藥各五錢覺噁心嘔吐加丁香上銼作二劑生薑三片煎服復元湯治妊婦嘔吐不止或頭痛全不思食左脈弱諸藥不效用以理血歸原人參白芍當歸川芎各五錢白朮茯苓陳皮各一兩半桔梗枳殼各二錢半丁香三錢甘草五錢半夏薑湯泡一兩上銼作十劑薑棗煎服妊娠三個月內嘔吐噁心不納米食用四物湯加陳皮半夏藿香砂仁白朮神麯麥芽陳倉米生薑煎服妊娠子煩妊娠子煩謂煩躁而悶亂心神也蓋四月受少陰君火以養精六月受少陽相火以養氣若母心驚膽寒多有是症産寶云是心肺虛熱或痰積於胸若三月而煩者但熱而已若痰飲而煩者吐涎惡食大凡停痰積飲寒熱相搏吐甚則胎動不安用竹葉湯竹葉湯防風去蘆麥冬泡去心白茯苓黃芩各等分上銼作劑用竹葉十片水煎食後溫服子癇妊娠子癇謂痰涎潮搐目吊口噤也用羚羊角散治妊娠中風頭項強直經脈拘急語言蹇澀痰涎不利或時發搐不省人事名曰子癇風羚羊角散羚羊角甘草當歸川芎防風獨活茯神五加皮杏仁木香薏苡仁酸棗仁炒上銼生薑五片水煎不拘時服子懸子懸謂妊娠心胃脹滿也用紫蘇和氣飲治婦人胎氣不和湊上心腹脹滿疼痛或臨産驚恐氣結連日不下及胎前一切諸疾紫蘇和氣飲當歸白芍川芎人參紫蘇梗陳皮大腹皮甘草上銼生薑三片蔥白七根水煎服腹痛加香附木香咳嗽加枳殼桑白皮熱加黃芩嘔吐加砂仁瀉泄加白朮茯苓難産加枳殼香附車前子子腫子腫者謂妊娠面目虛浮肢體腫滿也用茯苓湯治妊娠七八個月前後面目四肢浮腫茯苓湯當歸川芎白芍藥炒熟地黃白朮土炒子實黃芩茯苓澤瀉梔子酒炒甘草炙厚朴薑汁炙麥門冬上銼一劑水煎服子氣子氣者謂妊娠兩足浮腫也因脾衰不能制水血化成水所致用天仙藤散治妊娠三月成胎之後兩足自腳面漸腫至膝行步艱難喘悶妨食狀似水腫生於腳趾間黃水出者名曰子氣天仙藤即青木香藤洗炒紫蘇陳皮香附烏藥木香甘草上銼生薑煎服子淋子淋謂妊娠小便澀少也乃腎與膀胱虛熱不能治水然妊婦胞系於腎腎間虛熱而成斯症甚者心煩悶亂用下方子淋散治妊娠小便澀痛頻數麥門冬去心赤茯苓木通大腹皮洗去沙土薑汁拌炒甘草淡竹葉上銼水煎服車前散治小便淋瀝或不通下焦有熱者車前子當歸陳皮赤芍藥檳榔赤茯苓滑石木通石葦去毛炙上銼水煎服轉胞轉胞謂妊娠卒不得小便也因胎長逼近於胞胞為所逼令人數溲胞即膀胱也然子淋與轉胞相類但小便頻數點滴而痛為子淋頻數出少不痛為轉胞間有微痛終是與淋不同並宜五苓散加阿膠冬葵子散治孕婦轉胞小便不通冬葵子滑石梔子炒木通各五錢上銼一劑水一鍾半煎至一鍾空心溫服此藥滑胎臨月可用若六七個月以前不可用又方冬葵子滑石梔子為末田螺肉搗膏或生蔥汁調膏貼臍中立通胎漏妊娠經水時下此由衝任氣虛不能約制蓋心小腸二經相為表裡上為乳汁下為月水故妊娠經水壅之以養胎蓄之以為乳若經水時下名曰胎漏血盡則斃矣屬氣血虛有熱用下方膠艾四物湯當歸黃芩酒炒白芍酒炒白朮土炒熟地黃薑汁炒艾葉少許砂仁炒香附童便炒黑真阿膠蛤粉炒珠上銼一劑用粳米同煎服芎歸湯劉敏庵傳治胎漏下血不止或心腹脹滿一服立效當歸尾南川芎各五錢上銼一劑黃酒煎臨臥服入童便一盞即止胎動妊娠胎動或飲食起居或衝任風寒或跌僕擊觸或怒傷肝火或脾氣虛弱或推其因而治之若因母病而胎動但治其母若因胎動而母病惟當安其胎輕者轉動不安重者必致傷墜若面赤舌青是兒死也面青舌赤吐沫是母死也唇口俱青兩邊沫出是子母俱死也察而治之用下方佛手散治妊娠六七個月因事築磕著胎或子死腹中惡露下痛不已口噤欲絶用此探之若不損則痛止子母俱安若胎損即便逐下當歸二錢川芎四錢加益母草五錢更妙上銼一劑水一鍾入酒一鍾再煎一沸溫服如人行五六里再進一服安胎散治妊婦偶有所傷腹痛不安或從高墜下重傷所壓觸動胎元痛不可忍及下血又治胃虛氣逆嘔吐心腹諸痛大抵妊娠不可缺此縮砂不拘多少為末每服三錢熱酒調服艾鹽湯皆可此藥非八九個月內不宜用多安胎飲治孕成之後覺氣不安或腹微痛或腰間作痛或飲食不美或胎動下血及五六個月常服數貼甚效白朮二錢土炒條芩一錢半砂仁炒當歸白芍各一錢川芎紫蘇各八分甘草四分熟地黃一錢酒洗白朮黃芩乃安胎之聖藥也上銼一劑水煎服下血不止加炒蒲黃阿膠各一錢腹痛加香附醋炒一錢枳殼一錢麩炒千金保胎丸京師傳凡女人受胎經三月而墜者雖氣血不足乃中衝脈有傷中衝即陽明胃脈供應胎孕至此時必須謹節飲食絶嗜欲戒惱怒庶免小産之患也服此可保全歸身酒洗熟地黃薑炒阿膠蛤粉炒珠條芩炒川續斷酒洗香附酒醋童便鹽水各浸三日益母草陳皮各二兩艾葉醋炒南芎各一兩砂仁炒五錢白朮土炒杜仲薑炒各四兩紅棗煮皮去核上為末棗肉為丸如梧子大每服百丸空心米湯送下妊娠心痛妊娠心痛乍安乍甚者可服白朮散定痛安胎白朮散白朮土炒竹茹木香各五分當歸身白芍酒炒前胡烏藥陳皮各八分川芎香附便制紫蘇各一錢甘草四分上銼作劑水煎食遠服如兼腹痛加砂仁澤瀉附方小烏沉湯香附烏藥甘草妊娠中惡妊娠中惡忽然心腹刺痛悶絶欲死可服加減當歸散加減當歸散當歸川芎陳皮吳茱萸木香香附烏藥甘草前胡蔥白砂仁紫蘇上銼一劑生薑五片煎服附方當歸散證治準繩當歸川芎陳皮吳茱萸丁香妊娠腰腹痛妊娠腰腹背痛者可服加減通氣散加減通氣散當歸身蔥白阿膠茴香杜仲甘草陳皮破故紙山藥川芎萆薢獨活香附橘核白芍川續斷上銼作劑白水煎空心服如小腹痛加艾木香烏藥紫蘇去橘核山藥茴香續斷萆薢獨活破故紙附方膠艾湯金匱要略方川芎阿膠甘草艾葉當歸芍藥乾地黃清酒妊娠心腹脹滿妊娠心腹脹滿者可服加減倉公下氣湯加減倉公下氣湯白芍陳皮茯苓大腹皮川芎當歸香附前胡厚朴烏藥木香紫蘇梗上銼一劑空心服妊娠數墮胎妊娠數墮胎者是氣血不足腰痛甚者恐墮胎宜用加減安胎飲加減安胎飲黃耆甘草人參白朮艾葉當歸川芎熟地續斷茯苓白芍香附陳皮杜仲上銼作劑空心水煎服附方四物湯見妊娠惡阻異功散人參白朮茯苓炙甘草陳皮妊娠羸瘦妊娠羸瘦或挾病氣血枯竭既不能養胎必不能安者可下之以用加減牛膝湯加減牛膝湯桂心栝蔞牛膝瞿麥川芎歸梢枳殼甘草童便麥芽上銼作劑水煎空心服胎動欲産妊娠日月未足而痛如欲産者因勞役怒氣調養不節或房室所傷或負重閃肭或因宿有冷氣故有此症可用加減安胎飲加減安胎飲知母杜仲木香續斷香附陳皮烏藥紫蘇白芍川芎當歸白朮酒芩見血加地榆牡蠣艾葉附方當歸散金匱要略方當歸黃芩芍藥川芎白朮妊娠咳嗽妊娠咳嗽因感風寒傷於肺而成謂之子嗽可服加減紫菀湯止咳安胎加減紫菀湯貝母前胡紫菀白朮白皮甘草黃芩紫蘇陳皮知母杏仁五味子赤茯苓當歸麻黃喘加兜鈴腹皮款冬花附方陳自明紫菀湯紫菀天冬桔梗炙甘草杏仁桑白皮淡竹茹蜂蜜王海藏紫菀湯紫菀阿膠知母貝母桔梗人參茯苓甘草五味子三拗湯麻黃杏仁甘草妊娠傷寒妊娠傷寒頭痛壯熱腰痛體重甚則墜胎可服加減柴胡湯加減柴胡湯柴胡黃芩川芎當歸乾葛紫蘇陳皮蔥白妊娠時疫妊娠時疫日久傷胎可急服加減秦艽湯加減秦艽湯秦艽前胡黃芩枳殼桔梗山梔柴胡葛根陳皮紫蘇蔥白妊娠熱病妊娠熱病必致損胎可服加減梔子五物湯安胎清熱加減梔子五物湯葛根柴胡香薷石膏梔子前胡黃芩陳皮知母麥冬甘草蔥白妊娠熱病六七日後臟腑極熱蒸薰其胎致胎死腹中既死則胎冷不能自出但服黑神散暖其胎須臾即出何以知其胎死看産母舌青黑及胎冷者是也用加減黑神散加減黑神散生地赤芍桂心歸梢蒲黃鹿角屑紅花白芷朴硝黑豆香附益母草又方用巴豆三粒萆麻子麝香帖臍中妊娠瘧疾妊娠瘧疾熱極則損胎可服驅邪散驅邪散人參香茹青皮黃芩柴胡前胡川芎白朮砂仁藿香烏梅紅棗如心胸煩悶加炒黃連升麻妊娠霍亂妊娠霍亂乃陰陽清濁相干甚則傷胎可服加味白朮散加味白朮散白朮蒼朮人參茯苓豬苓香薷竹茹烏藥陳皮厚朴砂仁藿香乾葛木瓜澤瀉甘草妊娠瀉泄妊娠瀉泄冷熱不同乃飲食不節暑濕相乘可服人參白朮散人參白朮散四君平胃澤瀉豬苓歸身砂仁肉果木香香薷夏日可用妊娠痢疾妊娠下痢赤白可服加減阿膠散加減阿膠散當歸川芎白芍阿膠黃芩黃連香薷陳皮枳殼甘草澤瀉白茯苓如血痢加地榆白痢加艾葉木香痢久虛人加參朮黃耆瘦胎妊娠十月形體成就八月合進瘦胎易産之藥今醫多用枳殼散若胞氣肥實可服之況枳殼大腹皮瘦胎胎氣本怯豈宜又瘦之若進無憂散達生散安胎益氣令子緊小無病保生無憂散滑胎當歸川芎白芍人參白朮甘草陳皮神麯麥芽紫蘇訶子枳殼達生散孕之八九個月服數貼甚好易産腹少痛當歸白芍白朮各一錢人參陳皮紫蘇各五分甘草炙二分大腹皮一錢洗上銼作一劑蔥五根煎服如胎肥氣喘加枳殼八分黃楊腦七個二味瘦胎要藥夏加黃芩春加川芎冬加砂仁氣虛加參術氣實倍香附陳皮血虛倍當歸加熟地性急多怒加柴胡有熱加黃芩食易飢多加黃楊腦有痰加黃芩半夏腹痛加木香妊娠鬼胎妊娠鬼胎壯如懷妊腹內如包一甕如下血或腸水物可服斬鬼丹斬鬼丹吳茱萸川烏秦艽柴胡白殭蠶上為末煉蜜為丸如梧桐子大酒送下打出惡物即愈
