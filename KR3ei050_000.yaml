front:
  text: 序有難余者曰此豈越人過邯鄲且婦人之更僕數己子何獨降是余曰客時無謂余為婦人德耶人與世相閲由一世二世以至萬世者惟生耳故記有之曰時以為社稷主為先主後而可以不致敬乎言所繫重也且人道陰陽之患何所非病顧疾不盡人人亦不盡病産則婦人未能免者産非疾而其殺人乃在頃刻之間故婦人以生子為免身謂以得免為幸免矣一有不謹貽患終身皆婦人所獨也又閨幃祕密望聞有所不及巧工有所不盡往往寄命於俗媼狂巫之手急於索勸輕用其愚以致母子俱殞或致絶人宗祀良可矜痛余之為刻也欲家一冊得以時時檢鐸夫婦人女子亦知其患之所起與所以自全也聞之養筍者與竹養犢者與牸夫是直為婦人也與哉客曰善請以公之四方萬曆戊午中元日琅琊王化貞題
